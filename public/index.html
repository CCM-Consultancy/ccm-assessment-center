<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CCM Assessment Centre</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; background: #f5f5f5; }
      input, textarea, select, button { font-family: Arial, sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f5f5f5; }
      ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

      @media print {
        /* Hide everything by default */
        body > #root > div > * { display: none !important; }

        /* Show only the printable guide content */
        #ag-printable,
        #ag-printable * { display: revert !important; visibility: visible !important; }

        /* Make the guide fill the page */
        #ag-printable {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          padding: 24px !important;
          background: #fff !important;
        }

        /* Clean up cards for print */
        #ag-printable [style*="box-shadow"] { box-shadow: none !important; }
        #ag-printable [style*="border"] { border-color: #ddd !important; }

        /* Avoid breaking cards across pages */
        #ag-printable > div > div { break-inside: avoid; page-break-inside: avoid; }

        /* ── Report print view ────────────────────────────────────────── */
        /* body.rp-printing is set when printReport() injects content */
        body.rp-printing > #root { display: none !important; }
        body.rp-printing > #rp-print-inject {
          display: block !important;
          font-family: Arial, sans-serif;
          font-size: 11pt;
          color: #111;
          margin: 0; padding: 0;
        }
        body.rp-printing > #rp-print-inject .rp-page-break { page-break-before: always !important; }
        body.rp-printing > #rp-print-inject .rp-avoid-break { break-inside: avoid; page-break-inside: avoid; }

        /* Remove the second blank page that Chrome adds */
        html, body { height: auto !important; overflow: visible !important; }
        @page { margin: 16mm; size: A4 portrait; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
